<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', sans-serif;
        }

        .edit-box {
            max-width: 450px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
        }

        .form-control,
        .form-control:focus {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 8px;
            padding: 10px;
        }

        .form-control::placeholder {
            color: #bbb;
        }

        .form-control:focus {
            border-color: #00c6ff;
            box-shadow: 0 0 8px rgba(0, 198, 255, 0.6);
        }

        textarea.form-control {
            resize: none;
            height: 90px;
        }

        .btn-nexora {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            padding: 10px;
            transition: 0.3s;
        }

        .btn-nexora:hover {
            background: linear-gradient(45deg, #0072ff, #00c6ff);
            transform: scale(1.03);
        }

        .toggle-label {
            color: #ddd;
            font-size: 14px;
            margin-left: 8px;
        }

        .overview {
            color: white;
            margin-bottom: 4px;
            /* reduce space below label */
            margin-top: 10px;
            /* optional: space above */
            font-size: 14px;
        }

        .form-text {
            color: #bbb;
            font-size: 12px;
            text-align: center;
        }

        .profile-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: contain;
            padding: 3px;
            background: linear-gradient(45deg, #00c6ff, #0072ff, #00c6ff);
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.7);
        }

        @media (max-width: 576px) {
            .edit-box {
                margin: 0;
                height: 100vh;
                border-radius: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show m-2" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}
    <div class="edit-box">

        <div class="logo">Edit Profile</div>


        <form method="post" action="/home/edit_profile/" enctype="multipart/form-data">
            {% csrf_token %}

            <p class="overview">Profile Image</p>
            <div class="profile-wrapper">
                <img src="{{ user.profile_image.url }}" width="80" class="profile-img">
            </div>
            <input type="file" class="form-control mb-3" name="profile_img" accept="image/*">

            <!-- Username -->
            <p class="overview">Username</p>
            <input type="text" class="form-control mb-2" name="username" placeholder="Username"
                value="{{ user.username }}" required>

            <!-- Full Name -->
            <p class="overview">Fullname</p>
            <input type="text" class="form-control mb-2" name="name" placeholder="Full Name" value="{{ user.name }}"
                required>

            <!-- Bio -->
            <p class="overview">Bio</p>
            <textarea class="form-control mb-2" name="bio" maxlength="300" placeholder="Write something about yourself...">{{ user.bio }}</textarea>

            <!-- Private Toggle -->
            <div class="d-flex align-items-center mb-3">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="is_private" {% if user.is_private %}checked{%endif %}>
                </div>
                <label class="toggle-label">Private Account</label>
            </div>

            <button type="submit" class="btn btn-nexora w-100">Save Changes</button>

            <p class="form-text mt-3">
                Update your profile information anytime.
            </p>

        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
