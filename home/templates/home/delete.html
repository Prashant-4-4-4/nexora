<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Delete Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1c1c1c, #2c3e50, #000000);
            font-family: 'Segoe UI', sans-serif;
        }

        .delete-box {
            max-width: 450px;
            margin: 80px auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 35px 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title {
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            color: #ff4d4d;
            margin-bottom: 15px;
        }

        .warning {
            color: #ddd;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .form-control::placeholder {
            color: #bbb;
        }

        .form-control:focus {
            border-color: #ff4d4d;
            box-shadow: 0 0 8px rgba(255, 77, 77, 0.6);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .btn-delete {
            background: linear-gradient(45deg, #ff4d4d, #cc0000);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: linear-gradient(45deg, #cc0000, #ff4d4d);
            transform: scale(1.03);
        }

        .btn-cancel {
            margin-top: 15px;
            display: block;
            text-align: center;
            color: #bbb;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .btn-cancel:hover {
            color: #fff;
            text-decoration: underline;
        }

        @media (max-width: 576px) {
            .delete-box {
                margin: 0;
                height: 100vh;
                border-radius: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div class="delete-box">

        <div class="title">Delete Account</div>

        <div class="warning">
            Deleting your account is <strong>permanent</strong> and <strong>cannot be recovered</strong> once done.
            All your posts, messages, and followers will be removed. Please make sure you really want to proceed.
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show m-2" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}


        <form method="post" action="{% url 'delete_account' %}">
            {% csrf_token %}

            <input type="password" class="form-control" name="password" placeholder="Enter your password" required>

            <button type="submit" class="btn-delete">Delete My Account</button>
        </form>

        <a href="/home/" class="btn-cancel">Cancel</a>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
