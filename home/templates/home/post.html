<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Post</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background: #f5f7fb;
    }

    .post-container {
      max-width: 600px;
      margin: 30px auto;
      background: #fff;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
    }

    .upload-box {
      border: 2px dashed #ddd;
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .upload-box:hover {
      background: #f8f9fa;
    }

    .preview img,
    .preview video {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    .btn-post {
      border-radius: 25px;
    }
  </style>
</head>

<body>

  <div class="post-container">

    <h5 class="mb-3"><i class="fa-solid fa-plus"></i> Create Post</h5>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <!-- Title -->
      <div class="mb-3">
        <input type="text" name="title" class="form-control" placeholder="Write a caption...">
      </div>

      <!-- Upload Area -->
      <div class="upload-box mb-3" onclick="document.getElementById('fileInput').click()">
        <i class="fa-solid fa-cloud-arrow-up fa-2x mb-2"></i>
        <div>Click to upload images or videos</div>
        <input type="file" id="fileInput" name="files" multiple hidden accept="image/*,video/*">
      </div>

      <!-- Preview -->
      <div class="preview" id="preview"></div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary w-100 btn-post">
        Post
      </button>

    </form>

  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");

    fileInput.addEventListener("change", function () {
      preview.innerHTML = "";

      Array.from(this.files).forEach(file => {
        const url = URL.createObjectURL(file);

        if (file.type.startsWith("image")) {
          preview.innerHTML += `<img src="${url}">`;
        } else if (file.type.startsWith("video")) {
          preview.innerHTML += `<video controls src="${url}"></video>`;
        }
      });
    });
  </script>

</body>

</html>
