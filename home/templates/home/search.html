<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search User</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


  <style>
    .nothing {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: aqua;
      object-fit: contain;
    }

    .search-box {
      max-width: 400px;
      width: 100%;

    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #fff;
      border-top: 1px solid #ddd;
      padding: 10px 0;
      z-index: 1000;
    }

    .bottom-nav a {
      color: black;
      text-decoration: none;
      font-size: 1.rem;
    }
  </style>
</head>

<body>
{% load static %}
  <nav class="bg-light py-3 border-bottom">
    <div class="container">

      <div class="d-flex flex-column flex-md-row align-items-center justify-content-between">

        <div class="mb-2 mb-md-0">
          <h4 class="mb-0">Nexora</h4>
        </div>

        <form class="d-flex search-box" action="/home/search" method="post">
          {% csrf_token %}

          <input type="text" name="search" class="form-control me-2" placeholder="Search username..." required>

          <button class="btn btn-primary btn-sm">Search</button>
        </form>

        <!-- Spacer (desktop only) -->
        <div class="d-none d-md-block" style="width: 100px;"></div>

      </div>

    </div>
  </nav>
  {% if is_user %}
  {% if users%}
  <div class="container">
    {% for user in users %}
    <a href="/home/profile/{{user.username}}" class="text-decoration-none">
      <div class="row mt-3 align-items-center p-2 border rounded shadow-sm bg-white">
        <div class="col-md-1 col-2 text-center">
          <img src="/media/{{user.profile_image}}" class="nothing"></img>
        </div>
        <div class="col-md-6 col-10">
          <p class="mb-0 fw-bold text-dark">{{user.username}}</p>
          <p class="mb-0 text-muted small">{{user.name}}</p>
        </div>
      </div>
    </a>
    {% endfor %}
  </div>
  {% else %}
  <div class="container">
    <h3 class="mt-3">No User Found</h3>
  </div>
  {% endif %}
  {% endif %}
  <div class="bottom-nav d-flex justify-content-around align-items-center d-md-none">

    <a href="/home" class="text-dark text-center">
      <i class="fa-solid fa-house fs-5"></i>
    </a>

    <a href="/home/search" class="text-dark text-center">
      <i class="fa-solid fa-magnifying-glass fs-5"></i>
    </a>

    <a href="/home/post/" class="text-dark text-center">
      <i class="fa-solid fa-square-plus fs-5"></i>
    </a>

    <a href="/home/messages" class="text-dark text-center">
      <i class="fa-solid fa-message fs-5"></i>
    </a>

    <a href="/home/profile/{{ user.username }}" class="text-dark text-center">
      <i class="fa-regular fa-user fs-5"></i>
    </a>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
