<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f0f2f5;
    }
    .error-container {
      max-width: 600px;
      margin: 100px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .error-title {
      font-size: 24px;
      font-weight: bold;
      color: #dc3545;
      margin-bottom: 20px;
    }
    .error-message {
      font-size: 16px;
      margin-bottom: 25px;
    }
    .btn-back {
      font-size: 16px;
      padding: 8px 20px;
    }
  </style>
</head>
<body>

<div class="error-container">
  <div class="error-title">Oops!</div>
  <div class="error-message">
    {{ error }}
  </div>
  <a href="/home/" class="btn btn-primary btn-back">Go Back</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
