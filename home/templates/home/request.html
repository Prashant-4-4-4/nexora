<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Follow Requests</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<style>
  .app-header {
    padding: 15px 20px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #ffffff, #f3f6ff);
  }

  .bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #fff;
    border-top: 1px solid #ddd;
    padding: 10px 0;
    z-index: 1000;
  }

  .bottom-nav a {
    color: black;
    text-decoration: none;
    font-size: 1.rem;
  }
</style>

<body>
  <div class="app-header">
    <h1 class="logo-text">Nexora</h1>
  </div>
  <div class="container mt-5">
    <h2 class="mb-4">Follow Requests</h2>

    {% if incoming_requests %}
    <div class="list-group">
      {% for req_user in incoming_requests %}
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
          <img src="/media/{{ req_user.profile_image }}" class="rounded-circle" style="width:50px; height:50px;">
          <div>
            <strong>{{ req_user.username }}</strong><br>
            {{ req_user.name }}
          </div>
        </div>
        <div class="d-flex gap-2">
          <!-- Accept form -->
          <form method="post">
            {% csrf_token %}
            <input type="hidden" name="request_user_id" value="{{ req_user.id }}">
            <button type="submit" name="action" value="accept" class="btn btn-success btn-sm">Accept</button>
          </form>
          <!-- Reject form -->
          <form method="post">
            {% csrf_token %}
            <input type="hidden" name="request_user_id" value="{{ req_user.id }}">
            <button type="submit" name="action" value="reject" class="btn btn-danger btn-sm">Reject</button>
          </form>
        </div>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <p class="text-muted">No follow requests at the moment.</p>
    {% endif %}
  </div>
  <div class="bottom-nav d-flex justify-content-around align-items-center d-md-none">

    <a href="/home" class="text-dark text-center">
      <i class="fa-solid fa-house fs-5"></i>
    </a>

    <a href="/home/search" class="text-dark text-center">
      <i class="fa-solid fa-magnifying-glass fs-5"></i>
    </a>

    <a href="/home/post/" class="text-dark text-center">
      <i class="fa-solid fa-square-plus fs-5"></i>
    </a>

    <a href="/home/request" class="text-dark text-center">
      <i class="fa-regular fa-heart fs-5"></i>
    </a>

    <a href="/home/profile/{{ user.username }}" class="text-dark text-center">
      <i class="fa-regular fa-user fs-5"></i>
    </a>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
