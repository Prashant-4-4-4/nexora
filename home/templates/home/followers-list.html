<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ profile_user.username }}'s Followers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    .profile-img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: contain;
    }

    .user-card {
      transition: 0.2s;
    }

    .user-card:hover {
      background-color: #f8f9fa;
      transform: scale(1.01);
    }

    .action-btn {
      min-width: 100px;
    }
    .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #fff;
            border-top: 1px solid #ddd;
            padding: 10px 0;
            z-index: 1000;
        }

        .bottom-nav a {
            color: black;
            text-decoration: none;
            font-size: 1.rem;
        }

  </style>
</head>

<body>
  <nav class="bg-light py-3 border-bottom">
    <div class="container d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Nexora</h4>
      <a href="/home/" class="btn btn-secondary btn-sm">Back to Home</a>
    </div>
  </nav>

  <div class="container mt-4">
    <h5>{{ profile_user.username }}'s Followers</h5>
    {% if profile_user_followers %}
      {% for u in profile_user_followers %}
      <a href="/home/profile/{{ u.username }}" class="text-decoration-none text-dark">
        <div class="row align-items-center p-2 border rounded shadow-sm mb-2 user-card">
          <div class="col-2 col-md-1 text-center">
            <img src="/media/{{u.profile_image}}" class="profile-img">
          </div>
          <div class="col-10 col-md-6 d-flex justify-content-between align-items-center">
            <div>
              <p class="mb-0 fw-bold">{{ u.username }}</p>
              <p class="mb-0 text-muted small">{{ u.name }}</p>
            </div>
            {% if profile_user == user %}
            <form method="post" action="{% url 'remove_follower' u.username %}">
              {% csrf_token %}
              <button type="submit" class="btn btn-sm btn-danger action-btn">Remove</button>
            </form>
            {% endif %}
          </div>
        </div>
      </a>
      {% endfor %}
    {% else %}
      <h6 class="mt-3">No followers found.</h6>
    {% endif %}
  </div>
   <div class="bottom-nav d-flex justify-content-around align-items-center d-md-none">

    <a href="/home" class="text-dark text-center">
      <i class="fa-solid fa-house fs-5"></i>
    </a>

    <a href="/home/search" class="text-dark text-center">
      <i class="fa-solid fa-magnifying-glass fs-5"></i>
    </a>

    <a href="/home/post/" class="text-dark text-center">
      <i class="fa-solid fa-square-plus fs-5"></i>
    </a>

    <a href="/home/request" class="text-dark text-center">
      <i class="fa-regular fa-heart fs-5"></i>
    </a>

    <a href="/home/profile/{{ user.username }}" class="text-dark text-center">
      <i class="fa-regular fa-user fs-5"></i>
    </a>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
