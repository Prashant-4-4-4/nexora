<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Messages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
    .nothing {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: aqua;
    }

  </style>
</head>

<body>
    <div class="container">
        <h2>Messages</h2>
        {% for chat in chat_data %}

        {% for receiver in chat.receivers %}
        <a href="/home/message/{{ receiver.username }}" class="text-decoration-none">
            <div class="row mt-3 align-items-center p-2 border rounded shadow-sm bg-white">
                <div class="col-md-1 col-2 text-center">
                    <img src="/media/{{receiver.profile_image}}" class="nothing"></img>
                </div>
                <div class="col-md-6 col-10">
                    <p class="mb-0 fw-bold text-dark">{{ receiver.username}}</p>
                </div>
            </div>
        </a>
        {%endfor %}
        {% endfor %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
