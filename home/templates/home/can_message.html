<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background: #f5f7fb;
    }

    .chat-container {
      max-width: 800px;
      margin: 20px auto;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
    }

    .chat-header {
      padding: 15px;
      font-weight: 600;
      border-bottom: 1px solid #eee;
      background: #fff;
    }

    .chat-body {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      scrollbar-width: none;
      background: #eef1f7;
      display: flex;
      flex-direction: column-reverse;
    }

    .message {
      max-width: 70%;
      overflow-wrap: break-word;
      padding: 10px 14px;
      border-radius: 18px;
      margin-bottom: 10px;
      font-size: 14px;
      position: relative;
    }

    .sent {
      background: #4f46e5;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 5px;
    }

    .received {
      background: #fff;
      border: 1px solid #eee;
      margin-right: auto;
      border-bottom-left-radius: 5px;
    }

    .message img,
    .message video {
      margin-top: 5px;
      width: 100%;
      border-radius: 10px;
    }

    .timestamp {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }

    .chat-footer {
      padding: 10px;
      border-top: 1px solid #eee;
      background: #fff;
    }

    .chat-input {
      border-radius: 25px;
      padding: 8px 15px;
      font-size: 14px;
    }

    .icon-btn {
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
    }

    .send-btn {
      border-radius: 50%;
      width: 40px;
      height: 40px;
    }
  </style>
</head>

<body>

  <div class="chat-container">

    <!-- Header -->
    <div class="chat-header d-flex justify-content-between align-items-center">
      <div>
        <i class="fa-solid fa-user"></i> {{ receiver.username }}
      </div>
    </div>

    <!-- Chat Body -->
    <div class="chat-body" id="chat-body">

      {% for msg in messages reversed %}
      <div class="message {% if msg.sender.id == request.session.user_id %}sent{% else %}received{% endif %}">

        {% if msg.message %}
        <div>{{ msg.message }}</div>
        {% endif %}

        {% if msg.image %}
        <img src="{{ msg.image.url }}">
        {% endif %}

        {% if msg.video %}
        <video controls>
          <source src="{{ msg.video.url }}">
        </video>
        {% endif %}

        <div class="timestamp">
          {{ msg.timestamp|date:"H:i" }}
        </div>

      </div>
      {% endfor %}

    </div>

    <!-- Footer -->
    <div class="chat-footer">
      <form method="POST" enctype="multipart/form-data" class="d-flex align-items-center gap-2">
        {% csrf_token %}

        <!-- Image Upload -->
        <label class="icon-btn">
          <i class="fa-regular fa-image"></i>
          <input type="file" name="image" hidden accept="image/*">
        </label>

        <!-- Video Upload -->
        <label class="icon-btn">
          <i class="fa-solid fa-video"></i>
          <input type="file" name="video" hidden accept="video/*">
        </label>

        <!-- Text -->
        <input type="text" name="message" class="form-control chat-input" placeholder="Type a message...">

        <!-- Send -->
        <button type="submit" class="btn btn-primary send-btn">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </form>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
