<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEXORA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      overflow: hidden;
    }

    /* Animated glowing background circles */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.7;
      animation: float 20s infinite alternate;
      z-index: 0;
    }

    body::before {
      width: 400px;
      height: 400px;
      background: #00c6ff;
      top: -100px;
      left: -150px;
    }

    body::after {
      width: 500px;
      height: 500px;
      background: #ff00c6;
      bottom: -150px;
      right: -100px;
    }

    @keyframes float {
      0% {
        transform: translateY(0) translateX(0);
      }
      100% {
        transform: translateY(50px) translateX(50px);
      }
    }

    /* Glass card */
    .card-container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 50px 40px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      min-width: 300px;
      max-width: 400px;
      width: 90%;
    }

    /* Logo */
    .logo {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(90deg, #ff00c6, #00c6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 40px;
      text-shadow: 0 0 10px rgba(0, 198, 255, 0.6), 0 0 20px rgba(255, 0, 198, 0.4);
    }

    /* Buttons */
    .btn-custom {
      width: 100%;
      margin-bottom: 15px;
      padding: 12px 0;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 10px;
      border: none;
      color: white;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      box-shadow: 0 5px 15px rgba(0, 198, 255, 0.4);
      transition: all 0.3s ease;
    }

    .btn-custom:hover {
      background: linear-gradient(45deg, #0072ff, #00c6ff);
      box-shadow: 0 8px 25px rgba(0, 198, 255, 0.6);
      transform: translateY(-3px);
    }
  </style>
</head>

<body>
  <div class="card-container">
    <div class="logo">NEXORA</div>
    <a href="/login/"><button type="button" class="btn btn-custom">Log In</button></a>
    <a href="/signup/"><button type="button" class="btn btn-custom">Sign Up</button></a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
