<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: 'Segoe UI', sans-serif;
    }

    .change-box {
      max-width: 420px;
      margin: 80px auto;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      text-align: center;
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
      transition: 0.3s;
    }

    .form-control::placeholder {
      color: #bbb;
    }

    .form-control:focus {
      border-color: #00c6ff;
      box-shadow: 0 0 8px rgba(0, 198, 255, 0.6);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .btn-submit {
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      border: none;
      color: white;
      font-weight: 600;
      border-radius: 8px;
      padding: 10px;
      width: 100%;
      transition: 0.3s;
    }

    .btn-submit:hover {
      background: linear-gradient(45deg, #0072ff, #00c6ff);
      transform: scale(1.03);
    }

    .back-login {
      text-align: center;
      display: block;
      margin-top: 15px;
      font-size: 0.9rem;
      color: #bbb;
      text-decoration: none;
    }

    .back-login:hover {
      color: #00c6ff;
      text-decoration: underline;
    }

    @media (max-width: 576px) {
      .change-box {
        margin: 0;
        height: 100vh;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <div class="change-box">

    <div class="logo">Nexora</div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}

    <form method="post" action="/change-password/">
      {% csrf_token %}
      <input type="password" class="form-control" id="newpass" name="newpass" placeholder="New Password" required>
      <input type="password" class="form-control" id="confirmpass" name="confirmpass" placeholder="Confirm Password" required>
      <button type="submit" class="btn-submit">Change Password</button>
    </form>


  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
