<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* OTP BOX (same as login/signup) */
        .otp-box {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h3 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 8px;
            padding: 14px;
            font-size: 18px; /* bigger input */
            text-align: center;
            letter-spacing: 4px; /* OTP spacing */
            transition: 0.3s;
        }

        .form-control::placeholder {
            color: #bbb;
        }

        .form-control:focus {
            border-color: #00c6ff;
            box-shadow: 0 0 8px rgba(0, 198, 255, 0.6);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            font-weight: 600;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, #0072ff, #00c6ff);
            transform: scale(1.03);
        }

        .alert {
            border-radius: 8px;
            max-width: 420px;
            margin: 10px auto;
        }

        /* Mobile */
        @media (max-width: 576px) {
            .otp-box {
                border-radius: 12px;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show text-center" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}

    <div class="otp-box">
        <h3>Enter OTP</h3>

        <form method="post" action="/verify-otp/">
            {% csrf_token %}

            <input  type="tel"  name="enteredOtp"  placeholder="••••••" maxlength="6"  pattern="\d{6}"  inputmode="numeric" class="form-control mb-3 otp-input" required>
            <button type="submit" class="btn btn-primary">Verify OTP</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
