<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        /* Card */
        .signup-box {
            max-width: 420px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Logo */
        .logo {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: block;
        }

        /* Inputs */
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px; /* prevents zoom on mobile */
            transition: 0.3s;
        }

        .form-control::placeholder {
            color: #bbb;
        }

        .form-control:focus {
            border-color: #00c6ff;
            box-shadow: 0 0 8px rgba(0, 198, 255, 0.6);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        /* Date label fix */
        .form-label-small {
            color: #bbb;
            font-size: 13px;
            margin-bottom: 4px;
        }

        /* Select dropdown */
        select.form-control option {
            background: #203a43;
            color: #fff;
        }

        /* Button */
        .btn-nexora {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-nexora:hover {
            background: linear-gradient(45deg, #0072ff, #00c6ff);
            transform: scale(1.03);
        }

        /* Toggle */
        .toggle-label {
            color: #ddd;
            font-size: 14px;
            margin-left: 8px;
        }

        /* Small text */
        .form-text {
            color: #bbb;
            font-size: 12px;
            text-align: center;
        }

        /* Mobile Optimization */
        @media (max-width: 576px) {
            body {
                background: #0f2027;
            }

           
            .signup-box {
                margin: 40px auto;
            }


            .logo {
                font-size: 28px;
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="signup-box">

        <div class="logo">Nexora</div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        <form method="post" action="/signup/" enctype="multipart/form-data">
            {% csrf_token %}

            <input type="email" class="form-control mb-2" name="email" placeholder="Email" required>

            <input type="text" class="form-control mb-2" name="username" placeholder="Username" required>

            <input type="text" class="form-control mb-2" name="name" placeholder="Full Name" required>

            <input type="password" class="form-control mb-2" name="createpass" placeholder="Password" required>

            <input type="password" class="form-control mb-2" name="confirmpass" placeholder="Confirm Password" required>

            <input type="tel" class="form-control mb-2" name="phone" placeholder="Phone Number"
                maxlength="10" pattern="[0-9]{10}" inputmode="numeric" required>

            <input type="date" class="form-control mb-2" name="dob" required>

            <textarea class="form-control mb-2" name="bio"
                placeholder="Write something about yourself..." maxlength="300"></textarea>

            <input type="file" class="form-control mb-3" name="profile_img" accept="image/*">

            <div class="mb-3">
                <label class="form-label" style="color:#ddd;">Gender</label>
                <select class="form-control" name="gender" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="d-flex align-items-center mb-3">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="accountToggle" name="is_private">
                </div>
                <label class="toggle-label" for="accountToggle">
                    Private Account
                </label>
            </div>

            <button type="submit" class="btn btn-nexora w-100">Get OTP</button>

            <p class="form-text mt-3">
                By signing up, you agree to our Terms, Privacy Policy and Cookies Policy.
            </p>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
